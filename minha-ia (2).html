<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minha IA</title>
  <style>
    :root {
      --bg:      #ffffff; --bg2: #f7f7f5; --bg3: #f0f0ec;
      --border:  #e5e5e0; --border2: #d0d0ca;
      --text:    #1a1a18; --text2: #6b6b68; --text3: #aaaaA5;
      --accent:  #1a73e8; --accent2: #e8f0fe;
      --user-bg: #e8f0fe; --user-txt: #1a56c4;
      --bot-bg:  #f7f7f5; --bot-brd: #e5e5e0;
      --green:   #2a7a4a; --green-bg: #e8f5ee;
      --red:     #c0392b; --red-bg:   #fdecea;
    }
    .dark {
      --bg:      #191919; --bg2: #222; --bg3: #2a2a2a;
      --border:  #333;    --border2: #444;
      --text:    #e8e8e4; --text2: #9a9a95; --text3: #555550;
      --accent:  #6ba3f5; --accent2: #1a2a4a;
      --user-bg: #1a2a4a; --user-txt: #a0c0f8;
      --bot-bg:  #252525; --bot-brd: #333;
      --green:   #4caf80; --green-bg: #1a3328;
      --red:     #e07070; --red-bg:   #3a1a1a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* Setup */
    #setup {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem; gap: 12px;
    }
    .setup-logo {
      width: 48px; height: 48px; border-radius: 14px;
      background: var(--accent2);
      display: flex; align-items: center; justify-content: center; margin-bottom: 4px;
    }
    #setup h1 { font-size: 18px; font-weight: 600; }
    #setup p  { font-size: 13px; color: var(--text2); text-align: center; max-width: 300px; line-height: 1.5; }
    .sf { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 5px; }
    .sf label { font-size: 11px; color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; }
    .sf input, .sf select {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg2); color: var(--text);
      font-size: 13px; outline: none; font-family: inherit;
    }
    .sf input:focus, .sf select:focus { border-color: var(--accent); }
    #start-btn {
      width: 100%; max-width: 340px; padding: 11px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px;
    }
    #start-btn:hover { opacity: 0.9; }
    .hint { font-size: 11px; color: var(--text3); text-align: center; max-width: 300px; line-height: 1.7; }
    .hint a { color: var(--accent); text-decoration: none; }
    .free-badge {
      background: var(--green-bg); color: var(--green);
      font-size: 12px; font-weight: 600; padding: 4px 12px;
      border-radius: 20px;
    }

    /* App */
    #app { flex: 1; display: none; flex-direction: column; overflow: hidden; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 8px; }
    .topbar-dot  { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
    .topbar-name { font-size: 13px; font-weight: 600; }
    .topbar-mem  { font-size: 10px; color: var(--text3); background: var(--bg3); padding: 2px 7px; border-radius: 10px; }
    .topbar-right { display: flex; gap: 4px; }
    .tbtn {
      font-size: 11px; color: var(--text2);
      background: none; border: none; cursor: pointer;
      padding: 4px 8px; border-radius: 6px; font-family: inherit;
    }
    .tbtn:hover { background: var(--bg3); }
    .tbtn.active { background: var(--accent2); color: var(--accent); }

    .modelbar {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px; border-bottom: 1px solid var(--border);
      background: var(--bg2); flex-shrink: 0;
    }
    .modelbar label { font-size: 11px; color: var(--text3); white-space: nowrap; }
    .modelbar select {
      font-size: 12px; font-weight: 500; color: var(--text2);
      background: transparent; border: none; outline: none; cursor: pointer; font-family: inherit;
    }
    .mbadge {
      margin-left: auto; font-size: 10px; font-weight: 500;
      padding: 2px 8px; border-radius: 20px;
      background: var(--green-bg); color: var(--green);
    }

    /* Views */
    #view-chat, #view-memory { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #view-memory { display: none; }

    .actions {
      display: flex; gap: 6px; padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto; flex-shrink: 0;
    }
    .actions::-webkit-scrollbar { display: none; }
    .action-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 11px; border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg2); color: var(--text2);
      font-size: 12px; cursor: pointer; white-space: nowrap; font-family: inherit;
    }
    .action-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent2); }

    .messages {
      flex: 1; overflow-y: auto; padding: 14px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .msg { display: flex; flex-direction: column; gap: 3px; }
    .msg.user { align-items: flex-end; }
    .msg.bot  { align-items: flex-start; }
    .bubble {
      max-width: 86%; padding: 9px 13px; border-radius: 14px;
      font-size: 14px; line-height: 1.6; word-break: break-word;
    }
    .msg.user .bubble { background: var(--user-bg); color: var(--user-txt); border-bottom-right-radius: 4px; }
    .msg.bot  .bubble { background: var(--bot-bg); color: var(--text); border: 1px solid var(--bot-brd); border-bottom-left-radius: 4px; }
    .bubble p  { margin: 0 0 7px; } .bubble p:last-child { margin: 0; }
    .bubble strong { font-weight: 600; }
    .bubble em     { font-style: italic; }
    .bubble code   { background: var(--bg3); border-radius: 4px; padding: 1px 5px; font-size: 12px; font-family: monospace; }
    .bubble pre    { background: var(--bg3); border-radius: 8px; padding: 10px 12px; font-size: 12px; overflow-x: auto; margin: 6px 0; }
    .bubble pre code { background: none; padding: 0; }
    .bubble ul, .bubble ol { padding-left: 18px; margin: 4px 0; }
    .bubble li { margin: 2px 0; }
    .msg-meta { display: flex; gap: 6px; align-items: center; }
    .msg-time  { font-size: 10px; color: var(--text3); padding: 0 2px; }
    .mem-saved { font-size: 11px; color: var(--green); background: var(--green-bg); border-radius: 6px; padding: 3px 8px; align-self: flex-start; }

    .typing {
      display: flex; align-items: center; gap: 4px;
      background: var(--bot-bg); border: 1px solid var(--bot-brd);
      border-radius: 14px; border-bottom-left-radius: 4px;
      padding: 10px 14px; width: fit-content;
    }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%; background: var(--text3);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    .inputbar {
      padding: 10px 14px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
    }
    .inputbar textarea {
      flex: 1; padding: 9px 12px;
      border: 1px solid var(--border); border-radius: 10px;
      background: var(--bg2); color: var(--text);
      font-size: 14px; font-family: inherit;
      resize: none; outline: none; max-height: 120px; line-height: 1.45;
    }
    .inputbar textarea:focus { border-color: var(--accent); }
    .inputbar textarea::placeholder { color: var(--text3); }
    .send-btn {
      width: 36px; height: 36px; background: var(--accent);
      border: none; border-radius: 9px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Memory view */
    .mem-header {
      padding: 12px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .mem-header span { font-size: 13px; font-weight: 600; }
    .mem-header button {
      font-size: 11px; padding: 4px 10px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg2); color: var(--text2);
      cursor: pointer; font-family: inherit;
    }
    .mem-header button:hover { border-color: var(--red); color: var(--red); }
    .mem-body { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
    .mem-empty { font-size: 13px; color: var(--text3); text-align: center; margin-top: 2rem; line-height: 1.6; }
    .mem-item {
      display: flex; align-items: flex-start; gap: 10px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px;
    }
    .mem-item-text { flex: 1; font-size: 13px; color: var(--text2); line-height: 1.5; }
    .mem-item-del {
      background: none; border: none; cursor: pointer; padding: 2px;
      color: var(--text3); font-size: 16px; line-height: 1; flex-shrink: 0;
    }
    .mem-item-del:hover { color: var(--red); }
    .mem-add { display: flex; gap: 8px; padding: 0 14px 14px; flex-shrink: 0; }
    .mem-add input {
      flex: 1; padding: 9px 12px;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg2); color: var(--text);
      font-size: 13px; outline: none; font-family: inherit;
    }
    .mem-add input:focus { border-color: var(--accent); }
    .mem-add button {
      padding: 9px 14px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit;
    }
  </style>
</head>
<body>

<!-- Setup -->
<div id="setup">
  <div class="setup-logo">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#e8f0fe"/>
      <path d="M12 6l1.5 4.5H18l-3.75 2.75L15.75 18 12 15.25 8.25 18l1.5-4.75L6 10.5h4.5z" fill="#1a73e8"/>
    </svg>
  </div>
  <h1>Minha IA pessoal</h1>
  <span class="free-badge">Gratuito com Gemini</span>
  <p>Configure uma vez e use direto no Notion.</p>

  <div class="sf">
    <label>Seu nome (para personalizar)</label>
    <input type="text" id="user-name" placeholder="Ex: Vinícius" />
  </div>

  <div class="sf">
    <label>API Key do Google Gemini</label>
    <input type="password" id="api-key-input" placeholder="AIza..." />
  </div>

  <div class="sf">
    <label>Modelo</label>
    <select id="model-setup">
      <option value="gemini-2.5-flash-lite" selected>Gemini 2.5 Flash Lite — mais rápido e gratuito ⭐</option>
      <option value="gemini-2.5-flash">Gemini 2.5 Flash — equilibrado e gratuito</option>
      <option value="gemini-2.5-pro">Gemini 2.5 Pro — mais inteligente (100 req/dia grátis)</option>
    </select>
  </div>

  <button id="start-btn" onclick="startApp()">Começar</button>
  <p class="hint">
    Tudo salvo só neste navegador.<br/>
    Obtenha sua chave gratuita em<br/>
    <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com/app/apikey</a>
  </p>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-dot"></div>
      <span class="topbar-name" id="topbar-name">Minha IA</span>
      <span class="topbar-mem" id="mem-count">sem memórias</span>
    </div>
    <div class="topbar-right">
      <button class="tbtn active" id="btn-chat"   onclick="showView('chat')">Chat</button>
      <button class="tbtn"        id="btn-memory" onclick="showView('memory')">Memória</button>
      <button class="tbtn"        onclick="openSetup()">Config</button>
      <button class="tbtn"        onclick="clearChat()">Limpar</button>
    </div>
  </div>

  <div class="modelbar">
    <label>Modelo:</label>
    <select id="model-chat" onchange="saveModel()">
      <option value="gemini-2.5-flash-lite" selected>Gemini 2.5 Flash Lite</option>
      <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
      <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
    </select>
    <span class="mbadge" id="mbadge">gratuito</span>
  </div>

  <!-- Chat -->
  <div id="view-chat">
    <div class="actions">
      <button class="action-btn" onclick="quickAction('resumir')">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M2 4h12M2 8h8M2 12h10"/></svg>
        Resumir
      </button>
      <button class="action-btn" onclick="quickAction('revisar')">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M11 2l3 3-8 8H3v-3z"/></svg>
        Revisar texto
      </button>
      <button class="action-btn" onclick="quickAction('tarefas')">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 8l2 2 4-4"/></svg>
        Organizar tarefas
      </button>
      <button class="action-btn" onclick="quickAction('escrever')">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3 13h10M8 3l4 4-6 6H3v-3z"/></svg>
        Escrever
      </button>
      <button class="action-btn" onclick="quickAction('pesquisar')">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="7" cy="7" r="4"/><path d="M10 10l3 3"/></svg>
        Pesquisar
      </button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="inputbar">
      <textarea id="msg-input" rows="1" placeholder="Digite sua mensagem..."
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 13.5L13.5 8 3 2.5V6l7 2-7 2z" fill="#fff"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Memory -->
  <div id="view-memory">
    <div class="mem-header">
      <span>O que ela sabe sobre você</span>
      <button onclick="clearMemory()">Apagar tudo</button>
    </div>
    <div class="mem-body" id="mem-list"></div>
    <div class="mem-add">
      <input type="text" id="mem-input" placeholder="Adicionar informação manualmente..."
        onkeydown="if(event.key==='Enter') addMemoryManual()"/>
      <button onclick="addMemoryManual()">Adicionar</button>
    </div>
  </div>
</div>

<script>
  let apiKey = '', userName = '', history = [], memories = [];

  const QUICK = {
    resumir:  'Cole o texto que você quer resumir:\n\n',
    revisar:  'Cole o texto que você quer revisar:\n\n',
    tarefas:  'Descreva o projeto ou lista de tarefas para eu organizar:\n\n',
    escrever: 'O que você quer escrever? Descreva o tema e tom:\n\n',
    pesquisar:'Qual assunto você quer pesquisar ou entender melhor?\n\n',
  };

  function applyTheme() {
    const p = new URLSearchParams(location.search).get('theme');
    const dark = p==='dark'||(!p&&matchMedia('(prefers-color-scheme: dark)').matches);
    document.body.classList.toggle('dark', dark);
  }
  applyTheme();
  matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);

  window.onload = () => {
    apiKey   = localStorage.getItem('ia_gemini_key') || '';
    userName = localStorage.getItem('ia_user_name')  || '';
    memories = JSON.parse(localStorage.getItem('ia_memories') || '[]');
    const model = localStorage.getItem('ia_model') || 'gemini-2.5-flash-lite';
    document.getElementById('model-chat').value  = model;
    document.getElementById('model-setup').value = model;
    updateMemCount();
    if (apiKey) showApp();
  };

  function startApp() {
    const key  = document.getElementById('api-key-input').value.trim();
    const name = document.getElementById('user-name').value.trim();
    if (!key.startsWith('AIza')) { alert('API Key inválida. Deve começar com AIza'); return; }
    apiKey = key; userName = name;
    localStorage.setItem('ia_gemini_key', key);
    localStorage.setItem('ia_user_name',  name);
    const model = document.getElementById('model-setup').value;
    localStorage.setItem('ia_model', model);
    document.getElementById('model-chat').value = model;
    showApp();
  }

  function showApp() {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('app').style.display   = 'flex';
    document.getElementById('topbar-name').textContent = userName ? `IA de ${userName}` : 'Minha IA';
    updateMemCount();
    document.getElementById('msg-input').focus();
  }

  function openSetup() {
    document.getElementById('app').style.display   = 'none';
    document.getElementById('setup').style.display = 'flex';
    document.getElementById('api-key-input').value = '';
  }

  function saveModel() {
    localStorage.setItem('ia_model', document.getElementById('model-chat').value);
  }

  function showView(v) {
    document.getElementById('view-chat').style.display   = v==='chat'   ? 'flex' : 'none';
    document.getElementById('view-memory').style.display = v==='memory' ? 'flex' : 'none';
    document.getElementById('btn-chat').classList.toggle('active',   v==='chat');
    document.getElementById('btn-memory').classList.toggle('active', v==='memory');
    if (v==='memory') renderMemory();
  }

  function clearChat() { history=[]; document.getElementById('messages').innerHTML=''; }
  function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
  function handleKey(e)   { if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); } }
  function timeStr()      { return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }

  function quickAction(type) {
    const input = document.getElementById('msg-input');
    input.value = QUICK[type];
    autoResize(input);
    input.focus();
    input.setSelectionRange(input.value.length, input.value.length);
  }

  function appendMsg(role, text) {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const b = document.createElement('div');
    b.className = 'bubble';
    b.innerHTML = formatText(text);
    div.appendChild(b);
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    const t = document.createElement('span');
    t.className='msg-time'; t.textContent=timeStr();
    meta.appendChild(t);
    div.appendChild(meta);
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function showMemSaved(text) {
    const box = document.getElementById('messages');
    const el  = document.createElement('div');
    el.className='mem-saved'; el.textContent='Memória salva: ' + text;
    box.appendChild(el);
    box.scrollTop = box.scrollHeight;
  }

  function formatText(t) {
    return t
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.*?)\*/g,'<em>$1</em>')
      .replace(/^#{1,3} (.+)$/gm,'<strong>$1</strong>')
      .replace(/^- (.+)$/gm,'<li>$1</li>')
      .replace(/(<li>[\s\S]*?<\/li>)(?:\n|$)/g,'<ul>$1</ul>')
      .replace(/\n\n+/g,'</p><p>')
      .replace(/\n/g,'<br/>')
      .replace(/^(?!<)/,'<p>').replace(/(?<!>)$/,'</p>');
  }

  function showTyping() {
    const box=document.getElementById('messages');
    const d=document.createElement('div');
    d.className='msg bot'; d.id='typing';
    d.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
    box.appendChild(d); box.scrollTop=box.scrollHeight;
  }
  function hideTyping() { const e=document.getElementById('typing'); if(e) e.remove(); }

  function buildSystemPrompt() {
    const name = userName ? `O usuário se chama ${userName}.` : '';
    const memBlock = memories.length
      ? `\n\nO que você já sabe sobre o usuário:\n${memories.map((m,i)=>`${i+1}. ${m}`).join('\n')}`
      : '';
    return `Você é uma IA pessoal funcional e eficiente. Seja direto, prático e útil. Evite explicações desnecessárias. ${name}

Suas capacidades principais:
- Resumir e organizar notas e textos
- Ajudar com tarefas e projetos (listas, priorização, planejamento)
- Escrever e revisar textos (clareza, gramática, estrutura)
- Responder perguntas e pesquisar assuntos

Quando aprender algo relevante sobre o usuário (preferências, projetos, contexto, objetivos), inclua ao final da sua resposta uma linha no formato exato:
MEMORIZAR: [informação curta e objetiva]

Responda sempre em português.${memBlock}`;
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text  = input.value.trim(); if (!text) return;
    const btn   = document.getElementById('send-btn');
    const model = document.getElementById('model-chat').value;
    btn.disabled=true; input.value=''; input.style.height='auto';

    appendMsg('user', text);
    history.push({ role:'user', parts:[{ text }] });
    showTyping();

    try {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: buildSystemPrompt() }] },
          contents: history,
          generationConfig: { maxOutputTokens: 1500 },
        }),
      });

      const data = await res.json();
      hideTyping();

      if (data.error) {
        appendMsg('bot', `Erro: ${data.error.message}`);
        history.pop();
      } else {
        let reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Sem resposta.';
        history.push({ role:'model', parts:[{ text: reply }] });

        const memMatch = reply.match(/MEMORIZAR:\s*(.+)/i);
        if (memMatch) {
          const memText = memMatch[1].trim();
          reply = reply.replace(/MEMORIZAR:\s*.+/i, '').trim();
          addMemory(memText);
          showMemSaved(memText);
        }
        appendMsg('bot', reply);
      }
    } catch(e) {
      hideTyping();
      appendMsg('bot','Erro de conexão. Verifique sua chave.');
      history.pop();
    }
    btn.disabled=false; input.focus();
  }

  /* Memory */
  function addMemory(text) {
    if (!text || memories.includes(text)) return;
    memories.push(text);
    localStorage.setItem('ia_memories', JSON.stringify(memories));
    updateMemCount();
  }
  function addMemoryManual() {
    const input=document.getElementById('mem-input');
    const text=input.value.trim(); if (!text) return;
    addMemory(text); input.value=''; renderMemory();
  }
  function deleteMemory(i) {
    memories.splice(i,1);
    localStorage.setItem('ia_memories', JSON.stringify(memories));
    updateMemCount(); renderMemory();
  }
  function clearMemory() {
    if (!confirm('Apagar todas as memórias?')) return;
    memories=[]; localStorage.setItem('ia_memories','[]');
    updateMemCount(); renderMemory();
  }
  function updateMemCount() {
    document.getElementById('mem-count').textContent =
      memories.length===0 ? 'sem memórias' :
      memories.length===1 ? '1 memória' : `${memories.length} memórias`;
  }
  function renderMemory() {
    const list=document.getElementById('mem-list');
    if (!memories.length) {
      list.innerHTML='<div class="mem-empty">Nenhuma memória ainda.<br/>Converse com a IA e ela vai aprender sobre você.</div>';
      return;
    }
    list.innerHTML=memories.map((m,i)=>`
      <div class="mem-item">
        <div class="mem-item-text">${m}</div>
        <button class="mem-item-del" onclick="deleteMemory(${i})">×</button>
      </div>`).join('');
  }
</script>
</body>
</html>
