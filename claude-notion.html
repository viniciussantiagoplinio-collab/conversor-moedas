<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claude no Notion</title>
  <style>
    :root {
      --bg:       #ffffff;
      --bg2:      #f7f7f5;
      --bg3:      #f0f0ec;
      --border:   #e5e5e0;
      --text:     #1a1a18;
      --text2:    #6b6b68;
      --text3:    #aaaaA5;
      --accent:   #7c6ff7;
      --accent-bg:#f0effe;
      --user-bg:  #f0effe;
      --user-txt: #3b3490;
      --bot-bg:   #f7f7f5;
      --bot-txt:  #1a1a18;
      --send-bg:  #7c6ff7;
      --send-txt: #ffffff;
    }
    .dark {
      --bg:       #191919;
      --bg2:      #222222;
      --bg3:      #2a2a2a;
      --border:   #333333;
      --text:     #e8e8e4;
      --text2:    #9a9a95;
      --text3:    #555550;
      --accent:   #9d98f5;
      --accent-bg:#2a2650;
      --user-bg:  #2a2650;
      --user-txt: #c4c0f8;
      --bot-bg:   #252525;
      --bot-txt:  #e8e8e4;
      --send-bg:  #7c6ff7;
      --send-txt: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Setup screen */
    #setup {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 1rem;
    }
    #setup .logo {
      width: 44px; height: 44px;
      background: var(--accent-bg);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    #setup h1 { font-size: 18px; font-weight: 600; color: var(--text); }
    #setup p  { font-size: 13px; color: var(--text2); text-align: center; max-width: 300px; line-height: 1.5; }
    #setup input {
      width: 100%; max-width: 340px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg2);
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    #setup input:focus { border-color: var(--accent); }
    #setup button {
      width: 100%; max-width: 340px;
      padding: 10px;
      background: var(--send-bg);
      color: var(--send-txt);
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #setup button:hover { opacity: 0.9; }
    #setup .hint {
      font-size: 11px; color: var(--text3);
      text-align: center; max-width: 300px; line-height: 1.5;
    }
    #setup .hint a { color: var(--accent); text-decoration: none; }

    /* Chat screen */
    #chat { flex: 1; display: none; flex-direction: column; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .topbar-left { display: flex; align-items: center; gap: 8px; }
    .topbar-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
    }
    .topbar-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .topbar-model { font-size: 11px; color: var(--text3); }
    .topbar button {
      font-size: 11px; color: var(--text3);
      background: none; border: none; cursor: pointer; padding: 4px 8px;
      border-radius: 6px;
    }
    .topbar button:hover { background: var(--bg3); color: var(--text2); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg { display: flex; flex-direction: column; gap: 3px; }
    .msg.user { align-items: flex-end; }
    .msg.bot  { align-items: flex-start; }

    .bubble {
      max-width: 85%;
      padding: 9px 13px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--user-bg);
      color: var(--user-txt);
      border-bottom-right-radius: 4px;
    }
    .msg.bot .bubble {
      background: var(--bot-bg);
      color: var(--bot-txt);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .bubble p { margin: 0 0 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble code {
      background: var(--bg3);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 12px;
      font-family: monospace;
    }
    .bubble pre {
      background: var(--bg3);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      overflow-x: auto;
      margin: 6px 0;
    }
    .bubble pre code { background: none; padding: 0; }
    .bubble ul, .bubble ol { padding-left: 18px; margin: 4px 0; }
    .bubble li { margin: 2px 0; }

    .msg-time { font-size: 10px; color: var(--text3); padding: 0 4px; }

    .typing {
      display: flex; align-items: center; gap: 4px;
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-radius: 14px; border-bottom-left-radius: 4px;
      padding: 10px 14px;
      width: fit-content;
    }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text3);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    .inputbar {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      display: flex; gap: 8px; align-items: flex-end;
    }
    .inputbar textarea {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg2);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.45;
    }
    .inputbar textarea:focus { border-color: var(--accent); }
    .inputbar textarea::placeholder { color: var(--text3); }
    .send-btn {
      width: 36px; height: 36px;
      background: var(--send-bg);
      border: none; border-radius: 9px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn svg { stroke: #fff; }

    .system-bar {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      display: flex; align-items: center; gap: 8px;
    }
    .system-bar label { font-size: 11px; color: var(--text3); white-space: nowrap; }
    .system-bar input {
      flex: 1;
      border: none; background: transparent;
      color: var(--text2); font-size: 12px; outline: none;
      font-family: inherit;
    }
  </style>
</head>
<body>

<!-- Setup -->
<div id="setup">
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7c6ff7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2a9.96 9.96 0 0 1 6.29 2.23M21.8 9A10 10 0 1 1 12 2"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  </div>
  <h1>Claude no Notion</h1>
  <p>Cole sua API Key da Anthropic para começar a conversar.</p>
  <input type="password" id="api-key-input" placeholder="sk-ant-..." />
  <button id="start-btn" onclick="startChat()">Começar</button>
  <p class="hint">
    Sua chave fica salva só neste navegador.<br/>
    Obtenha em <a href="https://console.anthropic.com/keys" target="_blank">console.anthropic.com/keys</a>
  </p>
</div>

<!-- Chat -->
<div id="chat">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-dot"></div>
      <div>
        <div class="topbar-name">Claude</div>
        <div class="topbar-model">claude-sonnet-4-5</div>
      </div>
    </div>
    <button onclick="clearChat()">Limpar</button>
  </div>

  <div class="system-bar">
    <label>Instruções:</label>
    <input type="text" id="system-input" placeholder="Ex: Responda sempre em português de forma concisa." value="Você é um assistente útil. Responda em português."/>
  </div>

  <div class="messages" id="messages"></div>

  <div class="inputbar">
    <textarea id="msg-input" rows="1" placeholder="Mensagem..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke-width="2">
        <path d="M2 14L14 8 2 2v4.5l8 1.5-8 1.5z" stroke-linecap="round" stroke-linejoin="round" fill="#fff" stroke="none"/>
        <path d="M3 13.5L13.5 8 3 2.5V6l7 2-7 2z" fill="#fff"/>
      </svg>
    </button>
  </div>
</div>

<script>
  let apiKey = '';
  let history = [];

  function applyTheme() {
    const p = new URLSearchParams(location.search).get('theme');
    const dark = p === 'dark' || (!p && matchMedia('(prefers-color-scheme: dark)').matches);
    document.body.classList.toggle('dark', dark);
  }
  applyTheme();
  matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);

  window.onload = () => {
    const saved = localStorage.getItem('claude_api_key');
    if (saved) { apiKey = saved; showChat(); }
  };

  function startChat() {
    const val = document.getElementById('api-key-input').value.trim();
    if (!val.startsWith('sk-ant-')) {
      alert('API Key inválida. Deve começar com sk-ant-');
      return;
    }
    apiKey = val;
    localStorage.setItem('claude_api_key', val);
    showChat();
  }

  function showChat() {
    document.getElementById('setup').style.display = 'none';
    const chat = document.getElementById('chat');
    chat.style.display = 'flex';
    document.getElementById('msg-input').focus();
  }

  function clearChat() {
    history = [];
    document.getElementById('messages').innerHTML = '';
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function timeStr() {
    return new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  }

  function appendMsg(role, text) {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatText(text);
    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = timeStr();
    div.appendChild(bubble);
    div.appendChild(time);
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return bubble;
  }

  function formatText(t) {
    return t
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/^(.+)$/, '<p>$1</p>');
  }

  function showTyping() {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing-indicator';
    div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if (!text) return;

    const btn = document.getElementById('send-btn');
    btn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    appendMsg('user', text);
    history.push({role:'user', content: text});

    showTyping();

    const system = document.getElementById('system-input').value.trim()
      || 'Você é um assistente útil. Responda em português.';

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1024,
          system,
          messages: history,
        }),
      });

      const data = await res.json();
      hideTyping();

      if (data.error) {
        appendMsg('bot', `Erro: ${data.error.message}`);
        history.pop();
      } else {
        const reply = data.content[0].text;
        history.push({role:'assistant', content: reply});
        appendMsg('bot', reply);
      }
    } catch(e) {
      hideTyping();
      appendMsg('bot', 'Erro de conexão. Verifique sua chave e tente novamente.');
      history.pop();
    }

    btn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
